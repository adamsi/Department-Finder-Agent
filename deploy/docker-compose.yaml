services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
      - client

  server:
    image: ghcr.io/adamsi/department-finder-agent/server:latest
    env_file:
      - ./.env.server
    expose:
      - "8080"

  client:
    image: ghcr.io/adamsi/department-finder-agent/client:latest
    expose:
      - "3000"
